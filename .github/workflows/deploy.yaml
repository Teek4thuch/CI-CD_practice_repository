name : Deloy on push

on:
  push:
    branches:
      - main

jobs:
  check :
    runs-on: ubuntu-latest
    steps:
      - name : checkout
        uses : actions/checkout@v6
      - name : check folder
        run : |
          ls -la

  build :
    runs-on: ubuntu-latest
    steps:
    - name : checkout
      uses : actions/checkout@v6
    - name : Setup NPM
      uses : actions/setup-node@v3
      with : 
        node-version : '24'
    - name : Install dependencies
      run : npm ci
    - name : testing
      run : |
        echo "testing CI/CD pipeline"
        echo "Lobster is the best!"
    - name : build
      run : |
        echo "building the project"
        npm run build
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./.next

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4